<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VV Zaamslag – Fotogalerij</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="club-badge"><img src="Logo vv zaamslag.png" alt="VV Zaamslag" /></div>
      <div>
        <h1>VV Zaamslag</h1>
        <p class="subtitle">Fotogalerij</p>
      </div>
    </div>
  </header>

  <!-- Wachtwoord-gate (zelfde patroon als admin.html) -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-icon">🔒</div>
      <h2 class="login-title">Beheerderstoegang</h2>
      <p class="login-sub">Voer het wachtwoord in om de galerij te bekijken</p>
      <input
        type="password"
        id="password-input"
        class="login-input"
        placeholder="Wachtwoord"
        autocomplete="current-password"
      />
      <p id="login-error" class="login-error" hidden>Onjuist wachtwoord — probeer opnieuw.</p>
      <button class="btn-primary" id="login-btn">Inloggen</button>
    </div>
  </div>

  <main id="gallery-main" hidden>

    <div class="admin-toolbar">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">Alle</button>
        <button class="filter-btn" data-filter="Eerste Elftal">Eerste Elftal</button>
        <button class="filter-btn" data-filter="Jeugd">Jeugd</button>
      </div>
    </div>

    <p id="result-count" class="result-count"></p>

    <!-- Laden -->
    <div id="loading-state" class="feedback-state">
      <div class="spinner"></div>
      <p>Foto's laden…</p>
    </div>

    <!-- Leeg -->
    <div id="empty-state" class="feedback-state" hidden>
      <div class="feedback-icon">📷</div>
      <p>Nog geen goedgekeurde foto's.</p>
    </div>

    <!-- Fout -->
    <div id="error-state" class="feedback-state" hidden>
      <div class="feedback-icon">⚠</div>
      <p id="error-text">Er is een fout opgetreden.</p>
      <button class="btn-primary" id="retry-btn" style="margin-top:1rem">Opnieuw proberen</button>
    </div>

    <!-- Foto-grid -->
    <div id="gallery-grid" class="gallery-grid" hidden></div>

    <div id="gallery-cta" class="gallery-cta" hidden>
      <a href="admin.html" class="btn-primary">← Terug naar admin</a>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="gallery.js"></script>
</body>
</html>
