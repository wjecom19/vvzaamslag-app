<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VV Zaamslag – Diavoorstelling</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', Arial, sans-serif;
    }

    /* Twee foto-lagen voor vloeiende crossfade */
    .slide {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
    }
    .slide.actief { opacity: 1; }

    /* Logo rechtsonder */
    .logo {
      position: fixed;
      bottom: 28px;
      right: 28px;
      height: 56px;
      opacity: 0.85;
      z-index: 10;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
    }

    /* Voortgangsbalk onderaan */
    .progressbar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 4px;
      background: #a2c626;
      width: 0%;
      z-index: 10;
      transition: width linear;
    }

    /* Foto-teller linksboven */
    .teller {
      position: fixed;
      top: 20px;
      left: 24px;
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      z-index: 10;
    }

    /* Laadscherm */
    .laadscherm {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      z-index: 20;
      background: #000;
    }

    .laadscherm img { height: 64px; opacity: 0.9; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(162, 198, 38, 0.25);
      border-top-color: #a2c626;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .laadscherm p {
      color: rgba(255,255,255,0.55);
      font-size: 0.9rem;
    }

    /* Leeg scherm */
    .leegscherm {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: rgba(255,255,255,0.4);
      font-size: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Twee foto-elementen voor crossfade -->
  <img class="slide" id="slide-a" alt="" />
  <img class="slide" id="slide-b" alt="" />

  <!-- Logo -->
  <img class="logo" src="Logo vv zaamslag.png" alt="VV Zaamslag" />

  <!-- Voortgangsbalk -->
  <div class="progressbar" id="progressbar"></div>

  <!-- Teller -->
  <div class="teller" id="teller"></div>

  <!-- Laadscherm -->
  <div class="laadscherm" id="laadscherm">
    <img src="Logo vv zaamslag.png" alt="VV Zaamslag" />
    <div class="spinner"></div>
    <p>Foto's laden…</p>
  </div>

  <!-- Leeg scherm -->
  <div class="leegscherm" id="leegscherm" style="display:none">
    <span style="font-size:3rem">📭</span>
    <p>Nog geen goedgekeurde foto's</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="slideshow.js"></script>
</body>
</html>
